AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  GameLift Workshop - Workshop Studio pre-provisioning. Creates a cloud
  development machine (code-server / VS Code in the browser) with all tools
  installed and the workshop repository pre-cloned. The instance doubles as
  the participant's GameLift Anywhere compute in Module 3, so its security
  group opens the game port.

Parameters:
  RepoUrl:
    Type: String
    Default: https://github.com/malphi/gamelift-workshop.git
    Description: Workshop repository to pre-clone
  InstanceType:
    Type: String
    Default: t3.large
    Description: Dev machine instance type (2 vCPU / 8 GB is comfortable for CDK + Go builds)
  CodeServerPassword:
    Type: String
    Default: gamelift-workshop
    Description: Password for the browser IDE (shown to the participant in Event Outputs)
    NoEcho: false
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
    Description: CIDR block for the workshop VPC
  SubnetCidr:
    Type: String
    Default: 10.42.0.0/24
    Description: CIDR block for the public subnet (must fall within VpcCidr)
  VolumeSizeGb:
    Type: Number
    Default: 30
    Description: Root EBS volume size (GiB) for the dev machine
  GoVersion:
    Type: String
    Default: 1.26.2
    Description: Go toolchain version installed on the dev machine (must satisfy server/go.mod)

Resources:

  # ---------- network ----------
  WorkshopVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: gamelift-workshop-vpc }]

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WorkshopVpc
      CidrBlock: !Ref SubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']

  Igw:
    Type: AWS::EC2::InternetGateway
  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref WorkshopVpc
      InternetGatewayId: !Ref Igw
  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WorkshopVpc
  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw
  SubnetRoute:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # ---------- security ----------
  DevSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: >-
        code-server access + game ports (this instance acts as the GameLift
        Anywhere compute in Module 3; participant browsers connect to the
        game server running on it).
      VpcId: !Ref WorkshopVpc
      SecurityGroupIngress:
        # code-server origin: reached by CloudFront edges, not participants
        # directly (password auth protects it either way)
        - { IpProtocol: tcp, FromPort: 8080, ToPort: 8080, CidrIp: 0.0.0.0/0, Description: code-server HTTP origin for CloudFront }
        - { IpProtocol: tcp, FromPort: 1935, ToPort: 1935, CidrIp: 0.0.0.0/0, Description: Anywhere game server (Module 3) }
        - { IpProtocol: udp, FromPort: 1935, ToPort: 1935, CidrIp: 0.0.0.0/0, Description: Anywhere game server WebRTC/UDP }

  # ---------- IAM ----------
  DevInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # PowerUserAccess (all services EXCEPT IAM/Organizations/account
        # management) instead of AdministratorAccess — the dev machine runs the
        # workshop's `cdk deploy`, which needs broad service access but not
        # account/org control. The scoped IAM below covers the roles CDK must
        # create (cdk bootstrap roles + PixelRush* stack roles).
        - arn:aws:iam::aws:policy/PowerUserAccess
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CdkAndStackRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Create/manage only the IAM roles the workshop's CDK app needs.
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:TagRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:PassRole
                Resource:
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/cdk-*
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/PixelRush*
              # cdk bootstrap creates its own roles/policies with generated
              # names; read access is needed to plan diffs.
              - Effect: Allow
                Action:
                  - iam:List*
                  - iam:Get*
                Resource: '*'

  DevInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref DevInstanceRole]

  # ---------- dev machine ----------
  DevInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds: [!Ref DevSecurityGroup]
      IamInstanceProfile: !Ref DevInstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs: { VolumeSize: !Ref VolumeSizeGb, VolumeType: gp3 }
      Tags: [{ Key: Name, Value: gamelift-workshop-dev }]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > /var/log/workshop-init.log 2>&1
          # cloud-init runs UserData without HOME; the code-server install
          # script dereferences $HOME and set -u would kill the whole script
          export HOME=/root

          dnf install -y git docker
          systemctl enable --now docker

          # Go from go.dev, not the distro repo — the game server's go.mod
          # requires a newer toolchain than Amazon Linux ships (needs >= 1.26.2).
          # Integrity-checked against Go's official release manifest (go.dev's
          # JSON API publishes a SHA256 per file); a corrupted or tampered
          # download fails the checksum and aborts (set -e).
          GO_VERSION=${GoVersion}
          GO_TARBALL=go$GO_VERSION.linux-amd64.tar.gz
          curl -fsSL https://go.dev/dl/$GO_TARBALL -o /tmp/go.tar.gz
          GO_SHA256=$(curl -fsSL "https://go.dev/dl/?mode=json&include=all" \
            | python3 -c "import json,sys; print(next(f['sha256'] for v in json.load(sys.stdin) for f in v['files'] if f['filename']=='$GO_TARBALL'))")
          echo "$GO_SHA256  /tmp/go.tar.gz" | sha256sum -c -
          tar -C /usr/local -xzf /tmp/go.tar.gz
          ln -sf /usr/local/go/bin/go /usr/local/bin/go
          ln -sf /usr/local/go/bin/gofmt /usr/local/bin/gofmt

          # Node 20 via NodeSource. setup_20.x configures NodeSource's
          # GPG-signed dnf repository; `dnf install` then verifies the nodejs
          # package's GPG signature before installing (integrity enforced at the
          # package-manager layer). Official vendor installer, fetched over HTTPS.
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          dnf install -y nodejs

          # CDK
          npm install -g aws-cdk

          # code-server (VS Code in the browser) — official installer from
          # code-server.dev (the Coder team's canonical method), fetched over
          # HTTPS; on rpm hosts it installs a GPG-signed package via dnf. Plain
          # HTTP on 8080 — TLS, the public 443 and a real certificate come from
          # the CloudFront distribution in front (corp networks reject bare-IP
          # self-signed URLs; a *.cloudfront.net URL passes).
          curl -fsSL https://code-server.dev/install.sh | sh
          useradd -m workshop || true
          usermod -aG docker workshop
          mkdir -p /home/workshop/.config/code-server
          cat > /home/workshop/.config/code-server/config.yaml << CFG
          bind-addr: 0.0.0.0:8080
          auth: password
          password: ${CodeServerPassword}
          cert: false
          CFG
          chown -R workshop:workshop /home/workshop/.config

          # pre-clone the workshop repo + install dependencies. Drop the
          # tutorial-authoring dirs (workshop/, workshop-studio/) — participants
          # read the tutorial on the Workshop Studio site, not in the checkout.
          sudo -u workshop bash -c '
            cd /home/workshop
            git clone ${RepoUrl} gamelift-workshop || true
            cd gamelift-workshop
            rm -rf workshop workshop-studio
            (cd infra && npm install) || true
            (cd backend && npm install) || true
            (cd frontend && npm install) || true
          '

          # the Anywhere script needs the instance public IP for RegisterCompute
          TOKEN=$(curl -sX PUT http://169.254.169.254/latest/api/token -H 'X-aws-ec2-metadata-token-ttl-seconds: 300')
          PUB_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)
          echo "export COMPUTE_IP=$PUB_IP" >> /home/workshop/.bashrc
          echo "export AWS_REGION=${AWS::Region}" >> /home/workshop/.bashrc

          # run code-server as the workshop user
          cat > /etc/systemd/system/code-server.service << SVC
          [Unit]
          Description=code-server
          After=network.target
          [Service]
          User=workshop
          ExecStart=/usr/bin/code-server --config /home/workshop/.config/code-server/config.yaml /home/workshop/gamelift-workshop
          Restart=always
          [Install]
          WantedBy=multi-user.target
          SVC
          systemctl enable --now code-server

  # ---------- CloudFront in front of code-server ----------
  # Participants open https://xxxx.cloudfront.net — a real TLS cert on 443,
  # which corporate networks accept (bare-IP origins are often blocked).
  # WebSockets (VS Code terminal) pass through CloudFront natively.
  CodeServerDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: gamelift-workshop code-server
        DefaultCacheBehavior:
          TargetOriginId: code-server
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          # managed policies: CachingDisabled + AllViewer. AllViewer (not
          # ...ExceptHostHeader) forwards the viewer Host header so code-server
          # sees Host == Origin == the cloudfront domain; otherwise its
          # WebSocket CSRF check rejects the connection (close code 1006).
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
        Origins:
          - Id: code-server
            DomainName: !GetAtt DevInstance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 8080
              OriginProtocolPolicy: http-only

Outputs:
  CodeServerURL:
    Description: Open this in your browser (VS Code login page)
    Value: !Sub https://${CodeServerDistribution.DomainName}
  CodeServerPassword:
    Description: Password for the browser IDE
    Value: !Ref CodeServerPassword
  InstancePublicIp:
    Description: Used automatically by run-anywhere.sh (COMPUTE_IP) in Module 3
    Value: !GetAtt DevInstance.PublicIp
